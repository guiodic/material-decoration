# .github/workflows/review.yml
name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: ReviewPilot Action
        uses: prdai/review-pilot@v2.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          apiKey: ${{ secrets.GEMINI_API_KEY }}
          level: 'HIGH'
          customInstructionUri: 'https://raw.githubusercontent.com/guiodic/material-decoration/main/review-guide.txt'
